<script>
  $(function () {
    var mobileToolbarMq = window.matchMedia('(max-width: 767.98px)');
    var toolbarDisclosures = Array.prototype.slice.call(document.querySelectorAll('.cg-toolbar-disclosure'));

    function syncToolbarDisclosureState(event) {
      var isMobile = event.matches;
      toolbarDisclosures.forEach(function (panel) {
        if (isMobile) {
          panel.removeAttribute('open');
        } else {
          panel.setAttribute('open', 'open');
        }
      });
    }

    syncToolbarDisclosureState(mobileToolbarMq);
    if (typeof mobileToolbarMq.addEventListener === 'function') {
      mobileToolbarMq.addEventListener('change', syncToolbarDisclosureState);
    } else if (typeof mobileToolbarMq.addListener === 'function') {
      mobileToolbarMq.addListener(syncToolbarDisclosureState);
    }

    function activeAnnoToggleBtn() {
      var $pane = $('.tab-pane.show.active').first();
      var $btn = $pane.find('.cgToggleAllAnnoBtn').first();
      if (!$btn.length) $btn = $('.cgToggleAllAnnoBtn').first();
      return $btn;
    }
    function isRelaxStickyMode() {
      var $btn = activeAnnoToggleBtn();
      var showAll = $btn.length && $btn.attr('data-showing') === '1';
      return !!(showAll || (inlineEdit && inlineEdit.enabled));
    }
    function refreshStickyOffsets() {
      var navH = $('.cg-topnav').outerHeight() || 0;
      var $activePane = $('.tab-pane.show.active').first();
      var $sticky = $activePane.find('.cg-form-render-sticky').first();
      var relax = isRelaxStickyMode();
      $('.cg-page').toggleClass('cg-relax-sticky', relax);
      var stickyH = (!relax && $sticky.length) ? Math.ceil($sticky.outerHeight()) : 0;
      document.documentElement.style.setProperty('--cg-nav-h', navH + 'px');
      document.documentElement.style.setProperty('--cg-form-sticky-h', stickyH + 'px');
    }
    function refreshStickyOffsetsSoon() {
      window.requestAnimationFrame(function () {
        refreshStickyOffsets();
      });
    }

    $('#cgAdminToggleBtn').on('click', function () {
      var panel = $('#cgAdminPanel');
      var detail = document.querySelector('.cg-toolbar-disclosure');
      if (detail && mobileToolbarMq.matches) {
        detail.setAttribute('open', 'open');
      }
      panel.toggleClass('open');
      var isOpen = panel.hasClass('open');
      $(this).text(isOpen ? 'Hide Admin Filters' : 'Show Admin Filters');
      $(this).attr('aria-expanded', isOpen ? 'true' : 'false');
    });

    $('.cg-topnav .navbar-collapse .nav-link').on('click', function () {
      $('.cg-topnav .navbar-collapse').collapse('hide');
    });

    $('#formTabs a').on('click', function (e) {
      e.preventDefault();
      $(this).tab('show');
      var formFile = $(this).data('form-file');
      if (!formFile) return;
      var u = new URL(window.location.href);
      u.searchParams.set('file', formFile);
      window.history.replaceState({}, '', u.toString());
      refreshStickyOffsetsSoon();
    });
    $('#formTabs a').on('shown.bs.tab', function () {
      refreshStickyOffsetsSoon();
    });

    $(document).on('click', '.crf-anno-toggle', function () {
      var $td = $(this).closest('td');
      if ($td.length) {
        $td.find('.crf-anno-box').toggle();
        refreshStickyOffsetsSoon();
        return;
      }
      $(this).next('.crf-anno-box').toggle();
      refreshStickyOffsetsSoon();
    });

    $(document).on('click', '.cgToggleAllAnnoBtn', function () {
      var btn = $(this);
      var showing = btn.attr('data-showing') === '1';
      var $pane = btn.closest('.tab-pane');
      if (!$pane.length) $pane = activeFormPane();
      $pane.find('.crf-anno-box').toggle(!showing);
      $pane.find('.crf-form-anno-card').toggle(!showing);
      btn.attr('data-showing', showing ? '0' : '1');
      btn.text(showing ? 'Show All Annotations' : 'Hide All Annotations');
      refreshStickyOffsetsSoon();
    });

    // Admin: toggle a single form's visibility for end users via AJAX.
    $(document).on('click', '.cgToggleVisibilityBtn', function () {
      var $btn = $(this);
      if ($btn.prop('disabled')) return;
      var file = $btn.attr('data-form-file') || '';
      if (!file) return;
      var currentlyHidden = $btn.attr('data-hidden') === '1';
      var nextHidden = !currentlyHidden;
      var confirmMsg = nextHidden
        ? 'Hide "' + file + '" from end users?'
        : 'Publish "' + file + '" to end users?';
      if (!window.confirm(confirmMsg)) return;
      var original = $btn.html();
      $btn.prop('disabled', true).text(nextHidden ? 'Hiding…' : 'Publishing…');
      $.ajax({
        url: window.location.pathname + window.location.search,
        method: 'POST',
        dataType: 'json',
        data: { action: 'toggle_form_visibility', file: file, hidden: nextHidden ? '1' : '0' }
      }).done(function (resp) {
        if (!resp || !resp.ok) {
          alert((resp && resp.error) ? resp.error : 'Unable to change visibility.');
          $btn.html(original);
          return;
        }
        var isHidden = !!resp.hidden;
        $btn.attr('data-hidden', isHidden ? '1' : '0');
        $btn.attr('title', isHidden
          ? 'Form is hidden from end users. Click to publish.'
          : 'Form is visible to end users. Click to hide.');
        $btn.text(isHidden ? 'Hidden — click to Publish' : 'Visible — click to Hide');
        $btn.toggleClass('btn-warning', isHidden)
            .toggleClass('btn-outline-warning', !isHidden);
      }).fail(function (xhr) {
        var msg = 'Unable to change visibility.';
        try {
          var j = JSON.parse(xhr.responseText || '{}');
          if (j && j.error) msg = j.error;
        } catch (e) {}
        alert(msg);
        $btn.html(original);
      }).always(function () {
        $btn.prop('disabled', false);
      });
    });

    var inlineEdit = {

        validations[key] = (key === 'min' || key === 'max') && !isNaN(Number(val)) ? Number(val) : val;
      });
      if (Object.keys(validations).length) obj.validations = validations; else delete obj.validations;

      var render = (obj.render && typeof obj.render === 'object' && !Array.isArray(obj.render)) ? obj.render : {};
      [['section','#v_render_section'],['row','#v_render_row'],['col','#v_render_col'],['width','#v_render_width'],['css_class','#v_render_css_class']].forEach(function(pair){
        var key = pair[0], val = String($(pair[1]).val() || '').trim();
        if (val === '') { delete render[key]; return; }
        render[key] = (key === 'row' || key === 'col') && !isNaN(Number(val)) ? Number(val) : val;
      });
      if (Object.keys(render).length) obj.render = render; else delete obj.render;

      var logic = (obj.logic && typeof obj.logic === 'object' && !Array.isArray(obj.logic)) ? obj.logic : {};
      var logicExtraTxt = String($('#v_logic_extra_json').val() || '').trim();
      var logicExtraObj = logicExtraTxt ? parseJsonSafe(logicExtraTxt, null) : {};
      if (logicExtraTxt && (!logicExtraObj || typeof logicExtraObj !== 'object' || Array.isArray(logicExtraObj))) {
        throw new Error('logic (extra JSON) must be a JSON object.');
      }
      logic = $.extend(true, {}, logicExtraObj || {});
      var showIf = [];
      $('#v_showif_list .cg-showif-row').each(function(){
        var field = String($(this).find('.v_showif_field').val() || '').trim();
        var op = String($(this).find('.v_showif_op').val() || '').trim() || '=';
        var value = String($(this).find('.v_showif_value').val() || '').trim();
        if (!field && !value) return;
        showIf.push({ field: field, op: op, value: value });
      });
      if (showIf.length) logic.show_if = showIf; else delete logic.show_if;
      if (Object.keys(logic).length) obj.logic = logic; else delete obj.logic;

      $('#cgFieldMetaJson').val(prettyJson(obj));
      return obj;
    }
    function closeFieldMetaModal() {
      if (!$fieldMetaModal.length) return;
      $fieldMetaModal.removeClass('open').attr('aria-hidden', 'true');
      $('#cgFieldMetaError').addClass('d-none').text('');
      $('#cgFieldMetaSuccess').addClass('d-none').text('');
      fieldMetaContext = { trigger: null, file: '', originalFieldoid: '' };
    }

    $(document).on('click', '.cg-edit-field-btn', function (e) {
      e.preventDefault();
      if (inlineEdit.enabled) return;
      if (!$fieldMetaModal.length) return;
      var $btn = $(this);
      var $row = $btn.closest('tr');
      var jsonText = '';
      if ($row.length) {
        jsonText = $row.find('.cg-field-json-source').first().val() || '';
      }
      if (!jsonText) {
        jsonText = $btn.closest('td').find('.cg-field-json-source').first().val() || '';
      }
      if (!jsonText) {
        $('#cgFieldMetaError').removeClass('d-none').text('Unable to load field metadata JSON for editor.');
        return;
      }
      fieldMetaContext = {
        trigger: $btn,
        file: String($btn.data('file') || ''),
        originalFieldoid: String($btn.data('fieldoid') || '')
      };
      $('#cgFieldMetaFile').val(fieldMetaContext.file);
      $('#cgFieldMetaOriginalFieldoid').val(fieldMetaContext.originalFieldoid);
      $('#cgFieldMetaJson').val(jsonText);
      try { loadVisualFromField(JSON.parse(jsonText)); } catch (err) {}
      $('#cgFieldMetaInfo').text('Editing ' + fieldMetaContext.originalFieldoid + ' in ' + fieldMetaContext.file);
      $('#cgFieldMetaError').addClass('d-none').text('');
      $('#cgFieldMetaSuccess').addClass('d-none').text('');
      $fieldMetaModal.addClass('open').attr('aria-hidden', 'false');
    });

    $('#cgFieldMetaCloseTop, #cgFieldMetaCancel').on('click', closeFieldMetaModal);
    $(document).on('click', '.cg-meta-tabbtn', function(){
      var tab = String($(this).data('tab') || 'visual');
      $('.cg-meta-tabbtn').removeClass('active btn-outline-primary').addClass('btn-outline-secondary');
      $(this).addClass('active btn-outline-primary').removeClass('btn-outline-secondary');
      $('.cg-meta-tabpane').removeClass('active');
      if (tab === 'json') {
        $('#cgMetaTabJson').addClass('active');
      } else {
        $('#cgMetaTabVisual').addClass('active');
      }
    });
    $('#v_add_showif').on('click', function(){ addShowIfRow({}); });
    $(document).on('click', '.v_showif_remove', function(){ $(this).closest('.cg-showif-row').remove(); });
    $('#v_add_option').on('click', function(){ addOptionRow({}); });
    $(document).on('click', '.v_opt_remove', function(){ $(this).closest('.cg-option-row').remove(); });
    $('#v_apply_pipe_options').on('click', function(){
      clearOptionRows();
      pipeToOptions($('#v_response_options').val()).forEach(addOptionRow);
    });
    $('#cgVisualApplyToJson').on('click', function(){
      try {
        applyVisualToJson();
        $('#cgFieldMetaError').addClass('d-none').text('');
        $('#cgFieldMetaSuccess').removeClass('d-none').text('Visual changes applied to JSON editor.');
      } catch (err) {
        $('#cgFieldMetaSuccess').addClass('d-none').text('');
        $('#cgFieldMetaError').removeClass('d-none').text(err.message || 'Unable to apply visual changes.');
      }
    });
    $('#cgFieldMetaModal').on('click', function (e) {
      if (e.target === this) closeFieldMetaModal();
    });
    $(document).on('keydown', function (e) {
      if (e.key === 'Escape' && $fieldMetaModal.hasClass('open')) closeFieldMetaModal();
    });

    $('#cgFieldMetaSave').on('click', function () {
      var $error = $('#cgFieldMetaError');
      var $success = $('#cgFieldMetaSuccess');
      $error.addClass('d-none').text('');
      $success.addClass('d-none').text('');
      try {
        var activeTab = $('.cg-meta-tabbtn.active').data('tab');
        if (activeTab !== 'json') { applyVisualToJson(); }
      } catch (err) {
        $error.removeClass('d-none').text(err.message || 'Visual editor contains invalid values.');
        return;
      }

      var payload = {
        action: 'save_field_metadata',
        file: fieldMetaContext.file,
        original_fieldoid: fieldMetaContext.originalFieldoid,
        field_json: $('#cgFieldMetaJson').val()
      };

      var $saveBtn = $(this);
      $saveBtn.prop('disabled', true).text('Saving...');

      $.ajax({
        url: window.location.pathname + window.location.search,
        method: 'POST',
        data: payload,
        dataType: 'json'
      }).done(function (resp) {
        if (!resp || !resp.ok) {
          $error.removeClass('d-none').text((resp && resp.error) ? resp.error : 'Save failed.');
          return;
        }
        $success.removeClass('d-none').text(resp.message || 'Saved.');
        if (fieldMetaContext.trigger) {
          var $wrap = fieldMetaContext.trigger.closest('.cg-field-tools');
          $wrap.find('.cg-field-json-source').val($('#cgFieldMetaJson').val());
          if (resp.fieldoid) {
            fieldMetaContext.trigger.attr('data-fieldoid', resp.fieldoid);
          }
        }
        setTimeout(function(){ window.location.reload(); }, 500);
      }).fail(function (xhr) {
        var msg = 'Save failed.';
        if (xhr.responseJSON && xhr.responseJSON.error) msg = xhr.responseJSON.error;
        else if (xhr.responseText) {
          try { var p = JSON.parse(xhr.responseText); if (p.error) msg = p.error; } catch (e) {}
        }
        $error.removeClass('d-none').text(msg);
      }).always(function () {
        $saveBtn.prop('disabled', false).text('Save Field Metadata');
      });
    });
  });
</script>
</body></html>
