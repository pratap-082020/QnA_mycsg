$(document).ready(function() {
    // Iterate over the th elements
    $('th').each(function() {
        var th = $(this); // Current th element
        var dataName = th.data('name').toLowerCase(); // Get data-name attribute, converted to lowercase

        // Check if the current th's data-name is in the columnWidths object
        if (columnWidths.hasOwnProperty(dataName)) {
            th.css('width', columnWidths[dataName]); // Set the width
        }
    });
    </script><script>
