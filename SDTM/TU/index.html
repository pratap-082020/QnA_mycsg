<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Download Files</title>

  <style>

    body{
      font-family:Arial, sans-serif;
      background:#f5f5f5;
      padding:40px;
      text-align:center;
    }

    h1{
      margin-bottom:30px;
    }

    .container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      max-width:1000px;
      margin:auto;
    }

    button{
      padding:15px;
      border:none;
      border-radius:10px;
      background:#007bff;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.2s;
      width:100%;
    }

    button:hover{
      background:#0056b3;
      transform:translateY(-2px);
    }

  </style>

</head>

<body>

<h1>Download Files</h1>

<div class="container">

  <button onclick="downloadFile('r_data.r')">
    Download r_data.r
  </button>

  <button onclick="downloadFile('r_program.r')">
    Download r_programs.r
  </button>

  <button onclick="downloadFile('sas_data.txt')">
    Download sas_data.sas
  </button>

  <button onclick="downloadFile('sas_program.sas')">
    Download sas_program.sas
  </button>

  <button onclick="openPage('lesson.html')">
    Open Lesson
  </button>

  <button onclick="openPage('specs.html')">
    Open Specs
  </button>

  <button onclick="openPage('concept.html')">
    Open Concept
  </button>

</div>

<script>

function downloadFile(fileName){

    const link = document.createElement("a");

    link.href = fileName;

    link.download = fileName;

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);

}

function openPage(pageName){

    window.location.href = pageName;

}

</script>

</body>
</html>
