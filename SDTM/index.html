<!DOCTYPE html>
<html>
<head>

  <title>Programming Domains</title>

  <style>

    body{
      font-family:Arial,sans-serif;
      padding:20px;
      background:#f5f5f5;
    }

    h2{
      margin-bottom:20px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:12px;
    }

    a{
      display:block;
      padding:12px;
      background:white;
      border-radius:8px;
      text-decoration:none;
      color:#333;
      box-shadow:0 0 5px rgba(0,0,0,0.1);
      transition:0.2s;
      text-align:center;
      font-weight:bold;
    }

    a:hover{
      background:#d9edf7;
      transform:translateY(-2px);
    }

  </style>

</head>

<body>

<h2>Programming Domains</h2>

<div class="grid" id="folderGrid"></div>

<script>

const folders = [

  "AE",
  "PC",
  "CE",
  "PE",
  "CM",
  "PP",
  "CV",
  "PR",
  "DA",
  "QS",
  "DD",
  "RE",
  "DM",
  "RELREC",
  "DS",
  "RP",
  "DV",
  "RS",
  "EC",
  "SE",
  "EG",
  "SU",
  "EX",
  "SV",
  "FA",
  "TR",
  "FT",
  "TU",
  "HO",
  "VS",
  "IE",
  "TA",
  "IS",
  "TE",
  "LB",
  "TI",
  "MH",
  "TS",
  "MO",
  "TV"

];

const grid = document.getElementById("folderGrid");

folders.forEach(folder => {

    const a = document.createElement("a");

    a.href = encodeURIComponent(folder) + "/index.html";

    a.innerText = folder;

    grid.appendChild(a);

});

</script>

</body>
</html>
