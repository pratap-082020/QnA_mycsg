<!DOCTYPE html>
<html>
<head>

  <title>Programming Domains</title>

  <style>

    body{
      font-family:Arial,sans-serif;
      padding:20px;
      background:#f5f5f5;
    }

    h2{
      margin-bottom:20px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
      gap:12px;
    }

    a{
      display:block;
      padding:12px;
      background:white;
      border-radius:8px;
      text-decoration:none;
      color:#333;
      box-shadow:0 0 5px rgba(0,0,0,0.1);
      transition:0.2s;
    }

    a:hover{
      background:#d9edf7;
      transform:translateY(-2px);
    }

  </style>

</head>

<body>

<h2>Programming Folders</h2>

<div class="grid" id="folderGrid"></div>

<script>

const folders = [

  "Learn AE Programming",
  "Learn PC Programming",
  "Learn CE Programming",
  "Learn PE Programming",
  "Learn CM Programming",
  "Learn PP Programming",
  "Learn CV Programming",
  "Learn PR Programming",
  "Learn DA Programming",
  "Learn QS Programming",
  "Learn DD Programming",
  "Learn RE Programming",
  "Learn DM Programming",
  "Learn RELREC Programming",
  "Learn DS Programming",
  "Learn RP Programming",
  "Learn DV Programming",
  "Learn RS Programming",
  "Learn EC Programming",
  "Learn SE Programming",
  "Learn EG Programming",
  "Learn SU Programming",
  "Learn EX Programming",
  "Learn SV Programming",
  "Learn FA Programming",
  "Learn TR Programming",
  "Learn FT Programming",
  "Learn TU Programming",
  "Learn HO Programming",
  "Learn VS Programming",
  "Learn IE Programming",
  "TA",
  "Learn IS Programming",
  "TE",
  "Learn LB Programming",
  "TI",
  "Learn MH Programming",
  "TS",
  "Learn MO Programming",
  "TV"

];

const grid = document.getElementById("folderGrid");

folders.forEach(folder => {

    const a = document.createElement("a");

    a.href = encodeURIComponent(folder) + "/index.html";

    a.innerText = folder;

    grid.appendChild(a);

});

</script>

</body>
</html>
