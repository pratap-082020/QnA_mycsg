<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QnA Pages</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:#f5f5f5;
      padding:30px 15px;
      color:#222;
    }

    .container{
      max-width:800px;
      margin:auto;
    }

    h1{
      font-size:28px;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      margin-bottom:20px;
      font-size:15px;
      outline:none;
      background:white;
    }

    .list{
      background:white;
      border-radius:12px;
      overflow:hidden;
    }

    .item{
      border-bottom:1px solid #eee;
    }

    .item:last-child{
      border-bottom:none;
    }

    .item a{
      display:block;
      padding:16px 18px;
      text-decoration:none;
      color:#222;
      transition:0.2s;
    }

    .item a:hover{
      background:#f9f9f9;
    }

    .count{
      margin-top:12px;
      font-size:13px;
      color:#777;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>QnA HTML Pages</h1>

  <input
    type="text"
    id="search"
    placeholder="Search file..."
  >

  <div class="list" id="fileList"></div>

  <div class="count" id="count"></div>

</div>

<script>

const baseUrl =
"https://pratap-082020.github.io/QnA_mycsg/";

let allFiles = [

"adam.adae.html",
"adam.adlb.html",
"adam.adsl.html",
"adam.adtte.html",
"adam.bds.html",
"adam.general.html",
"domain.clinical_domain_standards.html",
"domain.general.html",
"domain.regulatory.html",
"domain.terminology.html",
"domain.trial_design_aspects.html",
"sas.clinical_sas.html",
"sas.data_step.html",
"sas.functions.html",
"sas.general.html",
"sas.log_issues.html",
"sas.macros.html",
"sas.ods.html",
"sas.proc_datasets.html",
"sas.proc_format.html",
"sas.proc_freq.html",
"sas.proc_means.html",
"sas.proc_print.html",
"sas.proc_report.html",
"sas.proc_sort.html",
"sas.proc_sql.html",
"sas.programming_logics.html",
"sas.system_options.html",
"sdtm.adverse_events.html",
"sdtm.comments.html",
"sdtm.concomitant_medications.html",
"sdtm.demographics.html",
"sdtm.disposition.html",
"sdtm.exposure.html",
"sdtm.findings.html",
"sdtm.medical_history.html",
"sdtm.subject_elements.html",
"sdtm.subject_visits.html",
"sdtm.suppqual.html",
"sdtm.trial_design.html",
"sdtm_general.html",
"statistics.clinical_trials_statistics.html",
"statistics.general.html",
"statistics.sas_statistics_procedures.html",
"statistics.statistics_tests.html",
"tlf.figures.html",
"tlf.general.html",
"tlf.listings.html",
"tlf.tables.html"

];

allFiles.sort();

function renderFiles(files){

  const fileList =
    document.getElementById('fileList');

  fileList.innerHTML = '';

  files.forEach(file => {

    fileList.innerHTML += `
    
      <div class="item">
      
        <a
          href="${baseUrl}${file}"
          target="_blank"
        >
          ${file}
        </a>

      </div>

    `;

  });

  document.getElementById('count').innerHTML =
    `${files.length} files`;

}

document
  .getElementById('search')
  .addEventListener('input', function(){

    const value =
      this.value.toLowerCase();

    const filtered =
      allFiles.filter(file =>
        file.toLowerCase().includes(value)
      );

    renderFiles(filtered);

  });

renderFiles(allFiles);

</script>

</body>
</html>
