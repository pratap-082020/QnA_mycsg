<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QnA Pages</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:#f5f5f5;
      padding:30px 15px;
      color:#222;
    }

    .container{
      max-width:900px;
      margin:auto;
    }

    h1{
      font-size:28px;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      margin-bottom:20px;
      font-size:15px;
      outline:none;
      background:white;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
      border-radius:10px;
      overflow:hidden;
    }

    th{
      background:#222;
      color:white;
      text-align:left;
      padding:14px;
      font-size:15px;
    }

    td{
      padding:14px;
      border-bottom:1px solid #eee;
      font-size:14px;
    }

    tr:hover{
      background:#fafafa;
    }

    a{
      color:#0066cc;
      text-decoration:none;
    }

    a:hover{
      text-decoration:underline;
    }

    .count{
      margin-top:12px;
      font-size:13px;
      color:#777;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>QnA HTML Pages</h1>

  <input
    type="text"
    id="search"
    placeholder="Search domain or topic..."
  >

  <table>

    <thead>
      <tr>
        <th>Domain</th>
        <th>Topic</th>
      </tr>
    </thead>

    <tbody id="tableBody"></tbody>

  </table>

  <div class="count" id="count"></div>

</div>

];

files.sort((a,b) =>
  a.domain.localeCompare(b.domain)
);

function renderTable(data){

  const tableBody =
    document.getElementById("tableBody");

  tableBody.innerHTML = "";

  data.forEach(item => {

    tableBody.innerHTML += `
    
      <tr>

        <td>
          ${item.domain.toUpperCase()}
        </td>

        <td>

          <a
            href="${baseUrl}${item.file}"
            target="_blank"
          >
            ${item.topic}
          </a>

        </td>

      </tr>

    `;

  });

  document.getElementById("count").innerHTML =
    `${data.length} topics`;

}

document
  .getElementById("search")
  .addEventListener("input", function(){

    const value =
      this.value.toLowerCase();

    const filtered =
      files.filter(item =>

        item.domain
          .toLowerCase()
          .includes(value)

        ||

        item.topic
          .toLowerCase()
          .includes(value)

      );

    renderTable(filtered);

  });

renderTable(files);

</script>
